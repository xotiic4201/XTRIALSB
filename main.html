                    <div class="chapter-content">
                        The first transmission was not meant to be heard.

                        On October 17, 1987, a technician named Robert Mullins was working the overnight shift at the Meadow Mist Public Access television station. At 2:13 AM, all channels simultaneously went to static. This was not unusual for public access in 1987, but the static was different. It pulsed. It breathed.

                        Mullins later reported that the static had a rhythm, a heartbeat. He hooked up an oscilloscope and measured the frequency. 52.9 Hz. Exactly 52.9 Hz.

                        "It sounded like someone was trying to speak through the noise," Mullins wrote in his report. "Not words exactly, but the shape of words. The rhythm of speech. I sat there for three hours just listening. I couldn't stop."

                        The next day, Mullins told his supervisor about the transmission. The supervisor laughed. "It's just interference," he said. "Probably a ham radio operator."

                        But Mullins knew what ham radio sounded like. This was something else.

                        Over the next week, Mullins recorded 47 hours of the static. He played it back at different speeds, trying to find a message. At 2:13 AM on October 24, he found it.

                        When slowed down by a factor of 47, the static revealed voices. Human voices. They were speaking in unison, saying the same phrase over and over:

                        "Come down to the basement. It's warm. It's safe. It's forever."

                        Mullins traced the signal. It was not coming from any radio tower. It was not coming from any satellite. It was coming from the old water tower on Elm Crescent. Specifically, from beneath it.

                        The basement.

                        On October 31, 1987, Robert Mullins drove to the water tower. He brought a tape recorder. He was never seen again.

                        Three days later, his car was found at the base of the tower. The engine was still running. The tape recorder was on the passenger seat. The tape inside contained 47 minutes of static, then a voice:

                        "I can see them. They're beautiful. They're waiting for me. Tell everyone 52.9 Hz is the key. Tell everyone to come at 2:13. Tell everyone I'll be in the basement."

                        That was the first transmission. It would not be the last.
